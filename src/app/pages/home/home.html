<!-- Hero -->
<section class="hero">
  <video class="hero-video" autoplay muted loop playsinline poster="assets/img/Maximal-Live-Poster.png-BW.png">
    <source src="assets/img/Maximal - LIVE Trimmed BW.webm" type="video/webm"/>
    <source src="assets/img/Maximal - LIVE Trimmed BW.mp4" type="video/mp4"/>
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="container">
      <h1>GODSPEED</h1>
      <p class="release-desc">The latest single from Empty Atlas</p>
      <div class="embeds">
        <iframe
          style="border-radius:12px"
          src="https://open.spotify.com/embed/track/7bdKT45IRECcseLpNEHM1h?utm_source=generator&theme=0"
          width="100%"
          height="352"
          frameBorder="0"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
      <a routerLink="/music" class="btn btn-primary" style="margin-top:2rem">View All Music</a>
    </div>
  </div>
  <div class="hero-scroll-hint">
    <span></span>
  </div>
</section>

<!-- Social CTA -->
<section class="section-content bg-gray-gradient">
  <div class="center-flex container">
    <app-social-icons/>
  </div>
</section>

<!-- Band Photo -->
<section class="band-photo-section">
  <img src="assets/img/Empty-Atlas_credit-Brent-McQuillin.jpeg" alt="Empty Atlas band photo by Brent McQuillin"
       loading="lazy"/>
  <div class="band-photo-overlay">
    <p class="photo-credit">Photo: Brent McQuillin</p>
  </div>
</section>

<!-- Tour CTA -->
<section id="tour" class="section-content bg-gray-gradient">
  <div class="container">
    <h2>Catch Us Live</h2>
    <div class="bit-widget-initializer"
         data-artist-name="Empty Atlas"
         data-display-local-dates="false"
         data-display-past-dates="false"
         data-auto-style="true"
         data-widget-width="100%"
         data-display-limit="15"
         data-link-color="#306910"
         data-link-text-color="#F1F1F1"
         data-background-color="transparent"
         data-text-color="#b3a575"
         data-separator-color="rgba(255,255,255,0.1)"
         data-display-start-time="true"
         data-display-lineup="true"
         data-display-plays-invalid="true"
         data-display-map="true"
         data-div-id="bit-widget"
         data-font="Raleway"
         data-button-label-going="I'm Going"
         data-button-label-notgoing="I'm Not Going"
    ></div>
  </div>
</section>
